# ============================================================
# 情绪识别规则引擎配置文件
# ============================================================
# 匹配逻辑：每条规则有若干命中条件（keywords / patterns），
#         命中后累加 score，最终按总分判定情绪等级。
# need_human：当总分 >= threshold 时直接转人工，不走 RAG。
# ============================================================

# ── 全局设置 ────────────────────────────────────────────────
settings:
  # 达到此分数立即转人工（含等于）
  need_human_threshold: 80
  # 各等级分数区间 [low, high)
  levels:
    negative_strong:   { min: 60, max: 80,  label: "强烈负面",   action: "soft_answer" }
    negative_moderate: { min: 30, max: 60,  label: "一般负面",   action: "soft_answer" }
    negative_mild:     { min: 10, max: 30,  label: "轻微负面",   action: "normal_answer" }
    neutral:           { min: -10, max: 10, label: "中性",       action: "normal_answer" }
    positive:          { min: -100, max: -10, label: "积极",    action: "normal_answer" }

# ── 人工介入规则（最高优先级，命中即转人工）────────────────
# 这些关键词/正则命中后直接标记 need_human=True，不累计分数
need_human_rules:
  - name: "投诉举报"
    keywords: ["投诉", "举报", "315", "消协", "工商局", "质检局", "投诉你们"]
    weight: 100

  - name: "法律维权"
    keywords: ["律师", "法院", "起诉", "赔偿", "法律途径", "维权", "告你们", "打官司"]
    patterns: ["要求.*赔偿", "法院.*见", "律师函", "追究.*责任"]
    weight: 100

  - name: "安全事故"
    keywords: ["着火", "起火", "爆炸", "漏电", "触电", "冒烟", "烧焦", "火灾", "伤人", "受伤", "划伤", "夹伤"]
    patterns: ["机器人.*(着火|起火|爆炸|漏电)", "(冒烟|烧焦|异味|火花)"]
    weight: 100

  - name: "人身攻击"
    keywords: ["垃圾产品", "骗钱", "黑心", "无良商家", "坑人", "废物", "破烂", "垃圾东西"]
    patterns: ["你们.*(骗|坑|黑)", "什么.*垃圾", "骗子"]
    weight: 100

  - name: "媒体曝光"
    keywords: ["媒体", "记者", "曝光", "电视台", "微博曝光", "抖音曝光", "网上曝光"]
    weight: 100

  - name: "强烈辱骂"
    keywords: ["操你", "傻逼", "去死", "滚蛋", "fuck", "shit", "nmsl"]
    weight: 100

# ── 情绪计分规则（累加分数）───────────────────────────────
scoring_rules:

  # ---- 愤怒 / 不满 ----
  - name: "强烈不满"
    keywords: ["太差了", "太烂了", "非常失望", "再也不会买", "无法忍受", "气死了", "太气人了", "忍无可忍"]
    patterns: ["太.*(差|烂|糟|垃圾)了", "非常.*(失望|生气|愤怒)", "忍无可忍"]
    score: 35

  - name: "抱怨质量"
    keywords: ["质量差", "劣质", "次品", "瑕疵", "做工粗糙", "用了就坏", "没多久就坏", "质量有问题", "品控差"]
    patterns: ["质量.*(差|有问题|不行)", "用.*就坏", "没多久.*坏"]
    score: 25

  - name: "抱怨售后"
    keywords: ["售后差", "客服没人", "不接电话", "推诿", "踢皮球", "不管不顾", "没人理", "态度差", "服务差", "售后推脱"]
    patterns: ["售后.*(差|不行|没人|推)", "客服.*(不理|不管|不接|没人)"]
    score: 30

  - name: "催促/不耐烦"
    keywords: ["快点", "赶紧", "怎么还没", "等了多久", "什么时候解决", "到底怎么回事", "搞什么", "能不能行"]
    patterns: ["怎么还.*(没|不)", "多久.*解决", "什么时候.*处理"]
    score: 15

  - name: "讽刺/阴阳怪气"
    keywords: ["呵呵", "真厉害啊", "真棒啊", "好样的", "了不起", "佩服佩服"]
    patterns: ["呵呵[。，！？]*$", "真.*(厉害|棒).*啊"]
    score: 20

  # ---- 焦虑 / 急切 ----
  - name: "焦虑急切"
    keywords: ["急死", "着急", "很急", "马上要用", "等不了", "尽快", "紧急", "十万火急"]
    patterns: ["急.*(死|死了|不行)", "马上.*(要|用|解决)", "尽快.*解决"]
    score: 15

  - name: "担心安全"
    keywords: ["害怕", "担心", "不敢用", "会不会", "安全吗", "危险吗", "安全吗"]
    patterns: ["会不会.*(爆炸|着火|漏电|伤人)", "安全.*吗", "危险.*吗"]
    score: 20

  # ---- 失望 / 无奈 ----
  - name: "失望无奈"
    keywords: ["算了", "认倒霉", "自认倒霉", "没办法", "无奈", "绝望", "心累", "不想说了", "说多了都是泪"]
    patterns: ["算了[，。！？]*$", "自认倒霉", "没办法.*了"]
    score: 15

  - name: "反复故障"
    keywords: ["又坏了", "又出问题", "老是坏", "总是坏", "反复修", "修不好", "修了又坏", "一直有问题"]
    patterns: ["又.*(坏|出问题|故障)", "老是.*(坏|出问题)", "总是.*(坏|故障)", "修.*又.*坏"]
    score: 25

  # ---- 轻微负面 ----
  - name: "轻微不满"
    keywords: ["不太满意", "一般般", "不太好", "有点差", "有点慢", "有点吵", "有点麻烦"]
    score: 10

  # ---- 正面情绪（减分） ----
  - name: "正面满意"
    keywords: ["谢谢", "感谢", "不错", "好用", "满意", "挺好的", "很棒", "推荐", "点赞"]
    patterns: ["谢谢.*(你|您|客服)", ".*不错", ".*好用", ".*满意"]
    score: -10

  - name: "中性咨询"
    keywords: ["请问", "想了解", "咨询一下", "问一下", "想知道"]
    score: -5

# ── 人工介入时的回复模板 ──────────────────────────────────
need_human_response: |
  我们非常重视您反馈的问题，当前问题已为您优先转接人工客服处理。
  请保持电话畅通，我们的专属客服专员将尽快与您联系。
  如需紧急协助，请拨打客服热线：400-XXX-XXXX。

# ── 情绪标签注入 RAG 提示词的模板 ────────────────────────
sentiment_prompt_template: |
  [用户情绪状态：{label}，情绪分数：{score}]
  请根据用户的情绪状态调整回答语气：
  - 强烈负面：先真诚致歉，再给出具体解决方案，表达同理心
  - 一般负面：表达理解和关切，提供清晰的解决步骤
  - 轻微负面：温和友善地解答，适当安抚
  - 中性/积极：正常专业回答即可
